<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simulateur Énergie</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Simulateur de Consommation Électrique</h1>

<div class="container">

<h2>Ajouter un appareil</h2>

<input type="text" id="nom" placeholder="Nom de l'appareil">
<input type="number" id="puissance" placeholder="Puissance (W)">
<input type="number" id="heures" placeholder="Heures par jour">

<button onclick="ajouterAppareil()">Ajouter appareil</button>

<h3>Appareils :</h3>
<ul id="liste"></ul>

<input type="number" id="jours" placeholder="Nombre de jours">

<button onclick="calculerTotal()">Calculer consommation</button>

<div id="resultat"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

<canvas id="monGraphique"></canvas>

</body>
</html>
